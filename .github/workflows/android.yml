name: Android CI/CD Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Permite trigger manual

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore File
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Erro: A secret RELEASE_KEYSTORE_BASE64 não está configurada no GitHub!"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Generate Version
        id: version
        run: |
          # Gerar versão baseada em timestamp UTC
          VERSION_NAME=$(date -u +"%Y%m%d.%H%M%S")
          VERSION_CODE=$(date -u +"%Y%m%d%H%M")
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Versão gerada: ${VERSION_NAME} (code: ${VERSION_CODE})"

      - name: Update build.gradle
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.VERSION_CODE }}/" build.gradle
          sed -i "s/versionName '[^']*'/versionName '${{ steps.version.outputs.VERSION_NAME }}'/" build.gradle
          echo "build.gradle atualizado:"
          grep -E "versionCode|versionName" build.gradle

      - name: Update AppInfo.java
        run: |
          sed -i 's/TEAMTALK_VERSION = "[^"]*"/TEAMTALK_VERSION = "${{ steps.version.outputs.VERSION_NAME }}"/' src/main/java/dk/bearware/data/AppInfo.java
          echo "AppInfo.java atualizado:"
          grep "TEAMTALK_VERSION" src/main/java/dk/bearware/data/AppInfo.java

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamTalk-APK
          path: build/outputs/apk/release/TeamTalk.apk

      - name: Create Tag and Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION_NAME }}"
          TAG="${{ steps.version.outputs.TAG_NAME }}"
          
          # Configurar git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Criar e push tag
          git tag -a "${TAG}" -m "Release ${VERSION}"
          git push origin "${TAG}"
          
          # Criar release com APK
          gh release create "${TAG}" \
            build/outputs/apk/release/TeamTalk.apk \
            --title "TeamTalk Plus v${VERSION}" \
            --generate-notes

  automerge:
    name: Auto-merge Dependabot PRs
    needs: build
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve and merge PR
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
