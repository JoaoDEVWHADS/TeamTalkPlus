name: Android CI/CD Build & Release

on:
  push:
    tags:
      - 'v*' # Dispara o build ao criar uma tag como v5.34.4
  workflow_dispatch: # Permite rodar o build manualmente pelo painel do GitHub

permissions:
  contents: write # Necessário para criar a release e fazer upload de arquivos

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # ESSENCIAL: Garante que os arquivos do Git LFS (.so) sejam baixados

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore File
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Erro: A secret RELEASE_KEYSTORE_BASE64 não está configurada no GitHub!"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamTalk-APK
          path: build/outputs/apk/release/TeamTalk.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/outputs/apk/release/TeamTalk.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
