name: Android CI/CD Build

on:
  push:
    branches:
      - '**' # Dispara em qualquer commit enviado para qualquer branch
  pull_request: # Também compila para validar Pull Requests

permissions:
  contents: write
  pull-requests: write # Necessário para aprovar e mesclar PRs automaticamente

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # Garante que os arquivos do Git LFS (.so) sejam baixados

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore File
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
            echo "Keystore decodificada com sucesso."
          else
            echo "Aviso: A secret RELEASE_KEYSTORE_BASE64 não está disponível nesta execução (comum em PRs do Dependabot). O app será compilado sem assinatura (unsigned)."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamTalk-APK
          path: build/outputs/apk/release/TeamTalk.apk

  automerge:
    name: Auto-merge Dependabot PRs
    needs: build
    runs-on: ubuntu-latest
    # Executa apenas se o PR foi aberto pelo Dependabot
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve and merge PR
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
